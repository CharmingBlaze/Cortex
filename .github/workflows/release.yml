name: Build Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 0.1.0)'
        required: true
        default: '0.1.0'
      zig_version:
        description: 'Zig version (e.g., 0.13.0)'
        required: true
        default: '0.13.0'

jobs:
  build:
    name: Build ${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          # Windows
          - os: windows
            arch: amd64
            runner: windows-latest
            extension: .exe
            zig_target: x86_64-windows
          - os: windows
            arch: arm64
            runner: windows-latest
            extension: .exe
            zig_target: aarch64-windows
          # Linux
          - os: linux
            arch: amd64
            runner: ubuntu-latest
            extension: ''
            zig_target: x86_64-linux
          - os: linux
            arch: arm64
            runner: ubuntu-latest
            extension: ''
            zig_target: aarch64-linux
          # macOS
          - os: darwin
            arch: amd64
            runner: macos-latest
            extension: ''
            zig_target: x86_64-macos
          - os: darwin
            arch: arm64
            runner: macos-latest
            extension: ''
            zig_target: aarch64-macos

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Get version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
            echo "ZIG_VERSION=${{ github.event.inputs.zig_version }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
            echo "ZIG_VERSION=0.13.0" >> $GITHUB_OUTPUT
          fi

      - name: Download Zig
        shell: bash
        run: |
          ZIG_VERSION=${{ steps.version.outputs.ZIG_VERSION }}
          ZIG_TARGET=${{ matrix.zig_target }}
          OS=${{ matrix.os }}
          
          if [ "$OS" = "windows" ]; then
            ZIG_URL="https://ziglang.org/download/${ZIG_VERSION}/zig-${ZIG_TARGET}-${ZIG_VERSION}.zip"
            curl -L -o zig.zip "$ZIG_URL"
            unzip zig.zip
            mv zig-${ZIG_TARGET}-${ZIG_VERSION} zig-bundle
          else
            ZIG_URL="https://ziglang.org/download/${ZIG_VERSION}/zig-${ZIG_TARGET}-${ZIG_VERSION}.tar.xz"
            curl -L -o zig.tar.xz "$ZIG_URL"
            tar -xf zig.tar.xz
            mv zig-${ZIG_TARGET}-${ZIG_VERSION} zig-bundle
          fi

      - name: Setup MSYS2 (Windows only)
        if: matrix.os == 'windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gtk4
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-pkg-config

      - name: Build
        shell: bash
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: 0
        run: |
          mkdir -p build
          go build -ldflags="-s -w -X main.Version=${{ steps.version.outputs.VERSION }}" -o build/cortex${{ matrix.extension }} ./cmd/cortex

      - name: Bundle GTK4 (Windows only)
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          # Build a simple GUI app for testing
          $env:PATH = "C:\msys64\mingw64\bin;$env:PATH"
          
          # Copy bundling script
          cp bundle_gtk.ps1 build/
          
          # Create GTK4 bundle directory
          $bundleDir = "gtk4-bundle"
          New-Item -ItemType Directory -Path $bundleDir -Force | Out-Null
          
          # Copy required GTK4 DLLs
          $msysBin = "C:\msys64\mingw64\bin"
          $gtkDlls = @(
            "libgtk-4-1.dll",
            "libgdk_pixbuf-2.0-0.dll",
            "libpango-1.0-0.dll",
            "libpangocairo-1.0-0.dll",
            "libpangowin32-1.0-0.dll",
            "libpangoft2-1.0-0.dll",
            "libcairo-2.dll",
            "libcairo-gobject-2.dll",
            "libgio-2.0-0.dll",
            "libglib-2.0-0.dll",
            "libgobject-2.0-0.dll",
            "libharfbuzz-0.dll",
            "libgraphene-1.0-0.dll",
            "libintl-8.dll",
            "libffi-8.dll",
            "libpixman-1-0.dll",
            "libpng16-16.dll",
            "libfreetype-6.dll",
            "libbz2-1.dll",
            "libbrotlidec.dll",
            "libbrotlicommon.dll",
            "libzstd.dll",
            "libexpat-1.dll",
            "libfontconfig-1.dll",
            "libiconv-2.dll",
            "libwinpthread-1.dll",
            "libgcc_s_seh-1.dll",
            "libstdc++-6.dll",
            "zlib1.dll",
            "libcrypto-3-x64.dll",
            "libssl-3-x64.dll",
            "libtiff-6.dll",
            "libjpeg-8.dll",
            "libwebp-7.dll",
            "libjbig-0.dll",
            "libLerc.dll",
            "libdeflate.dll",
            "libfribidi-0.dll"
          )
          
          foreach ($dll in $gtkDlls) {
            $src = Join-Path $msysBin $dll
            if (Test-Path $src) {
              Copy-Item $src -Destination $bundleDir -Force
            }
          }
          
          # Copy GDK-Pixbuf loaders
          $loadersDir = "$bundleDir/lib/gdk-pixbuf-2.0/2.10.0/loaders"
          New-Item -ItemType Directory -Path $loadersDir -Force | Out-Null
          Copy-Item "C:\msys64\mingw64\lib\gdk-pixbuf-2.0\2.10.0\loaders\*.dll" -Destination $loadersDir -Force -ErrorAction SilentlyContinue
          Copy-Item "C:\msys64\mingw64\lib\gdk-pixbuf-2.0\2.10.0\loaders.cache" -Destination "$bundleDir/lib/gdk-pixbuf-2.0/2.10.0/" -Force -ErrorAction SilentlyContinue
          
          # Copy icons
          $iconsDir = "$bundleDir/share/icons/Adwaita"
          New-Item -ItemType Directory -Path $iconsDir -Force | Out-Null
          Copy-Item -Path "C:\msys64\mingw64\share\icons\Adwaita\symbolic" -Destination $iconsDir -Recurse -Force -ErrorAction SilentlyContinue
          Copy-Item -Path "C:\msys64\mingw64\share\icons\Adwaita\index.theme" -Destination $iconsDir -Force -ErrorAction SilentlyContinue
          
          # Copy GLib schemas
          $schemasDir = "$bundleDir/share/glib-2.0/schemas"
          New-Item -ItemType Directory -Path $schemasDir -Force | Out-Null
          Copy-Item -Path "C:\msys64\mingw64\share\glib-2.0\schemas\gschemas.compiled" -Destination $schemasDir -Force -ErrorAction SilentlyContinue
          
          Write-Host "GTK4 bundle created successfully"

      - name: Create package
        shell: bash
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          OS=${{ matrix.os }}
          ARCH=${{ matrix.arch }}
          EXT=${{ matrix.extension }}
          PKG_DIR="cortex-${VERSION}-${OS}-${ARCH}"
          
          mkdir -p ${PKG_DIR}/bin
          mkdir -p ${PKG_DIR}/zig
          mkdir -p ${PKG_DIR}/runtime
          mkdir -p ${PKG_DIR}/examples
          mkdir -p ${PKG_DIR}/docs
          
          # Copy binary
          cp build/cortex${EXT} ${PKG_DIR}/bin/
          
          # Copy Zig bundle
          cp -r zig-bundle/* ${PKG_DIR}/zig/
          
          # Copy runtime
          cp -r runtime/*.c ${PKG_DIR}/runtime/ 2>/dev/null || true
          cp -r runtime/*.h ${PKG_DIR}/runtime/ 2>/dev/null || true
          
          # Copy examples
          cp -r examples/* ${PKG_DIR}/examples/ 2>/dev/null || true
          
          # Copy docs
          cp README.md ${PKG_DIR}/
          cp LANGUAGE_SPEC.md ${PKG_DIR}/docs/
          cp LANGUAGE_GUIDE.md ${PKG_DIR}/docs/
          cp LICENSE ${PKG_DIR}/
          
          # Copy GTK4 bundle for Windows
          if [ "${OS}" = "windows" ]; then
            mkdir -p ${PKG_DIR}/gtk4
            cp -r gtk4-bundle/* ${PKG_DIR}/gtk4/
            cp bundle_gtk.ps1 ${PKG_DIR}/bin/
            cp bundle_gtk.ps1 ${PKG_DIR}/
            
            # Create README for GTK4
            cat > ${PKG_DIR}/gtk4/README.txt << 'EOF'
          GTK4 Runtime Bundle
          ===================
          
          This folder contains all GTK4 DLLs and resources needed to run
          Cortex GUI applications on Windows without installing GTK4.
          
          Usage:
          1. Compile your GUI app: cortex -i myapp.cx -o myapp.exe
          2. Copy myapp.exe and the entire gtk4/ folder together
          3. Run myapp.exe - it will automatically find the GTK4 DLLs
          
          To create a distributable bundle for your app:
          Run: powershell -ExecutionPolicy Bypass -File bundle_gtk.ps1 -AppExe myapp.exe
          
          This creates a dist/ folder with everything needed.
          EOF
          fi
          
          # Create archive
          if [ "${OS}" = "windows" ]; then
            7z a -tzip "cortex-${VERSION}-${OS}-${ARCH}.zip" ${PKG_DIR}
          else
            tar -czvf "cortex-${VERSION}-${OS}-${ARCH}.tar.gz" ${PKG_DIR}
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cortex-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            cortex-*.zip
            cortex-*.tar.gz

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -la artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: Cortex v${{ steps.version.outputs.VERSION }}
          body: |
            ## Cortex v${{ steps.version.outputs.VERSION }}
            
            ### Downloads
            
            | Platform | Architecture | Download |
            |----------|--------------|----------|
            | Windows | x64 | `cortex-${{ steps.version.outputs.VERSION }}-windows-amd64.zip` |
            | Windows | ARM64 | `cortex-${{ steps.version.outputs.VERSION }}-windows-arm64.zip` |
            | Linux | x64 | `cortex-${{ steps.version.outputs.VERSION }}-linux-amd64.tar.gz` |
            | Linux | ARM64 | `cortex-${{ steps.version.outputs.VERSION }}-linux-arm64.tar.gz` |
            | macOS | Intel | `cortex-${{ steps.version.outputs.VERSION }}-darwin-amd64.tar.gz` |
            | macOS | Apple Silicon | `cortex-${{ steps.version.outputs.VERSION }}-darwin-arm64.tar.gz` |
            
            ### Installation
            
            **Windows:**
            1. Download and extract the zip
            2. Add the `bin` folder to your PATH
            3. Run `cortex --help`
            
            **GTK4 GUI Apps (Windows):**
            - The `gtk4/` folder contains all GTK4 runtime files
            - No need to install GTK4 separately
            - To distribute your GUI app: `powershell -ExecutionPolicy Bypass -File bundle_gtk.ps1 -AppExe myapp.exe`
            
            **Linux/macOS:**
            ```bash
            tar -xzf cortex-*.tar.gz
            export PATH="$PWD/cortex-*/bin:$PATH"
            cortex --help
            ```
            
            ### Requirements
            - A C compiler (GCC, Clang, or TCC)
            - Windows: MinGW included in package, or TCC
            - Linux: GCC (usually pre-installed)
            - macOS: Xcode Command Line Tools
            - For GUI apps on Linux/macOS: `sudo apt install libgtk-4-dev` or `brew install gtk4`
            
            ### What's New
            See [CHANGELOG.md](CHANGELOG.md) for changes.
          files: |
            artifacts/**/*
          draft: false
          prerelease: false
